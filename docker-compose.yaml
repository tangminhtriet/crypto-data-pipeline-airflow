version: '3'

x-airflow-common:
  &airflow-common
  build: .
  environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres_airflow/airflow
    - AIRFLOW__CORE__LOAD_EXAMPLES=False
  volumes:
    - .:/opt/airflow/dags
  depends_on:
    postgres_airflow:
      condition: service_healthy

services:
  postgres_crypto:
    image: postgres:15
    container_name: crypto_db
    environment:
      POSTGRES_USER: triet
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: crypto_warehouse
    ports:
      - "5435:5432"
    volumes:
      - pgdata_crypto:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "triet"]
      interval: 5s
      retries: 5

  postgres_airflow:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    # Lệnh này sẽ ép Airflow migrate database và tạo user admin cùng lúc
    command: bash -c "airflow db migrate && airflow users create --username admin --firstname admin --lastname admin --role Admin --email admin@example.com --password admin"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    ports:
      - "3000:3000"
    restart: always
volumes:
  pgdata_crypto: